<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crea Nuova Scommessa 🔮</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <h2>Crea una Nuova Sfida 🎯</h2>
    
    <div style="margin-bottom: 15px; text-align: left;">
        <label style="font-weight: bold; font-size: 14px;">Domanda della Scommessa:</label>
        <input type="text" id="input-domanda" placeholder="Es: Stasera Marco pagherà il conto?">
        
        <label style="font-weight: bold; font-size: 14px; margin-top: 10px; display: block;">🎁 Premio in palio:</label>
        <input type="text" id="input-premio" placeholder="Es: Una birra media 🍺">
        
        <label style="font-weight: bold; font-size: 14px; margin-top: 10px; display: block;">⏱️ Durata (in ore):</label>
        <input type="number" id="input-ore" value="2" min="1">
    </div>

    <button id="btn-salva-sfida" class="btn-option" style="background-color: #A5D6A7; font-weight: bold;">Lancia la Sfida! 🚀</button>
    
    <br><br>
    <a href="index.html" class="btn-option" style="background-color: #CBD5E1; text-decoration: none; display: inline-block; width: auto; padding: 8px 15px; font-size: 13px; color: #334155;">
        ⬅️ Torna allo Storico
    </a>
</div>

<script type="module" src="crea.js"></script>
</body>
</html>
